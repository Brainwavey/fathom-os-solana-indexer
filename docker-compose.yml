version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nopassword123-!
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    ports:
      - "8001:8001"
    environment:
      # Notice it says "@db" instead of "@localhost". This is the Docker magic.
      - DATABASE_URL=postgresql+asyncpg://postgres:Nopassword123-!@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy